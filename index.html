<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things</title>
</head>

<body>
    <header>
        <h2>GC.</h2>
        <img src="img/netflix.svg" alt="logo da netflix">
    </header>
    
    <main>
        <!-- SEÇÃO HERO -->
        <section class="hero">
            <div class="esquerda">
                <h3>THE EXPERIENCE</h3>
                <h1>STRANGER THINGS</h1>
            </div>
            <div class="direita">
                <p>Descubra os seus poderes e vire o herói da sua própria aventura!</p>
                <button>ESCOLHA SUA CIDADE</button>
                <img src="img/seta-botao.svg" alt="seta botão">
            </div>
        </section>

        <!-- SEÇÃO ESCOLHA DE CIDADE -->
        <section class="secaoCidade">
            <div class="tituloCidade">
                <h2>ESCLHA SUA CIDADE</h2>
                <button>ESCOLHA SUA CIDADE</button>
                <img src="img/seta-botao.svg" alt="seta botão">
                </div>

                <div class="cards">
                    <div class="card">
                        <h3>Sidney</h3>
                        <p>INGRESSOS DISPONÍEVIS</p>
                    </div>

                    <div class="card">
                        <h3>Cidade do México</h3>
                        <p>INGRESSOS DISPONÍEVIS</p>
                    </div>
                    
                    <div class="card">
                        <h3>Yas island</h3>
                        <p>INGRESSOS DISPONÍEVIS</p>
                    </div>
                </div>
        </section>

        <section class="secaoDepoimentos">
            <div class="logotipos">
                <img src="img/netflix-logo.svg" alt="logo da netflix">
                <img src="img/clio-logo.svg" alt="logo da netflix">
                <img src="img/fever-logo.svg" alt="logo da netflix">
            </div>

            <div class="depoimentos">
                <div class="depoimento">
                    <img src="img/img-dep1.webp" alt="">
                    <P></P>
                </div>

                <div class="depoimento">
                    <img src="img/img-dep2.webp" alt="">
                    <P></P>
                </div>

                <div class="depoimento">
                    <img src="img/img-dep3.webp" alt="">
                    <P></P>
                </div>
                
            </div>
        </section>
        
        
    </main>

</body>

</html>
